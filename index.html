<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jChess Examples</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2rem;
      color: #f0d9b5;
    }

    .games {
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .game-section {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .game-section h2 {
      font-size: 1.1rem;
      color: #b58863;
      font-weight: 600;
    }

    .game-layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .board-wrap {
      --jchess-size: 400px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding-top: 0.25rem;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
    }

    button {
      padding: 0.4rem 0.9rem;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 120ms;
    }
    button:hover:not(:disabled) { background: #3a3a3a; }
    button:disabled { opacity: 0.4; cursor: default; }

    .move-display {
      font-family: monospace;
      font-size: 0.9rem;
      color: #f0d9b5;
      min-height: 1.2em;
    }

    .annotation {
      max-width: 320px;
      font-size: 0.8rem;
      line-height: 1.5;
      color: #aaa;
      font-style: italic;
      white-space: pre-wrap;
    }

    .halfmove-display {
      font-size: 0.75rem;
      color: #666;
    }

    hr { border: none; border-top: 1px solid #333; }
  </style>
</head>
<body>
  <h1>jChess</h1>
  <div class="games" id="games"></div>

  <script type="module">
    import { ChessViewer } from './src/chess.ts'

    const DEMOS = [
      {
        title: '1) Blank Board',
        options: {},
      },
      {
        title: '2) FEN Position',
        options: { fen: 'rnbqkbnr/pp1ppppp/8/2p5/4P3/5N2/PPPP1PPP/RNBQKB1R b KQkq - 1 2' },
      },
      {
        title: '3) Fischer vs. Spassky (1992)',
        pgn: 'fischer-spassky.pgn',
      },
      {
        title: '4) justdoeet vs. Zornhau',
        pgn: 'justdoeet.pgn',
      },
      {
        title: '5) Markowski vs. Piket — long game with queening',
        pgn: 'with-queening.pgn',
      },
      {
        title: '6) Unambiguous Knight Move',
        pgn: 'unambiguous-knight.pgn',
      },
      {
        title: '7) Heavily Annotated Game',
        pgn: 'heavily-annotated.pgn',
      },
      {
        title: '8) FEN: Mid-game position',
        options: { fen: 'rq2r1k1/1b3pp1/p3p1n1/1p4BQ/8/7R/PP3PPP/4R1K1 w - - 0 0' },
      },
      {
        title: '9) Middle Game — jump to move 25',
        pgn: 'middle-game.pgn',
        jumpTo: 25,
      },
    ]

    async function loadPGN(filename) {
      const res = await fetch(`./examples/${filename}`)
      return res.text()
    }

    async function buildDemo(demo, container) {
      const section = document.createElement('div')
      section.className = 'game-section'

      const h2 = document.createElement('h2')
      h2.textContent = demo.title
      section.appendChild(h2)

      const layout = document.createElement('div')
      layout.className = 'game-layout'
      section.appendChild(layout)

      const boardWrap = document.createElement('div')
      boardWrap.className = 'board-wrap'
      layout.appendChild(boardWrap)

      let options = demo.options ?? {}
      if (demo.pgn) {
        options = { ...options, pgn: await loadPGN(demo.pgn) }
      }

      const viewer = new ChessViewer(boardWrap, options)

      if (demo.jumpTo) {
        viewer.jumpTo(demo.jumpTo)
      }

      // Only show controls if there are moves to navigate
      if (viewer.getTotalMoves() > 0) {
        const controls = document.createElement('div')
        controls.className = 'controls'
        layout.appendChild(controls)

        const btnRow = document.createElement('div')
        btnRow.className = 'btn-row'
        controls.appendChild(btnRow)

        const backBtn = document.createElement('button')
        backBtn.textContent = '← Back'
        btnRow.appendChild(backBtn)

        const nextBtn = document.createElement('button')
        nextBtn.textContent = 'Next →'
        btnRow.appendChild(nextBtn)

        const flipBtn = document.createElement('button')
        flipBtn.textContent = 'Flip'
        btnRow.appendChild(flipBtn)

        const moveDisplay = document.createElement('div')
        moveDisplay.className = 'move-display'
        controls.appendChild(moveDisplay)

        const halfmoveDisplay = document.createElement('div')
        halfmoveDisplay.className = 'halfmove-display'
        controls.appendChild(halfmoveDisplay)

        const annotation = document.createElement('div')
        annotation.className = 'annotation'
        controls.appendChild(annotation)

        function update() {
          const move = viewer.getCurrentMove()
          const hm = viewer.getHalfmove()
          const total = viewer.getTotalMoves()
          const fullMove = Math.ceil(hm / 2)
          const side = hm % 2 === 1 ? 'White' : 'Black'
          moveDisplay.textContent = move
            ? `${fullMove}. ${hm % 2 === 0 ? '...' : ''}${move}`
            : '(start)'
          halfmoveDisplay.textContent = `Move ${hm} / ${total}`
          annotation.textContent = viewer.getAnnotation() ?? ''
          backBtn.disabled = !viewer.getHalfmove()
          nextBtn.disabled = hm >= total
        }

        backBtn.addEventListener('click', () => { viewer.prev(); update() })
        nextBtn.addEventListener('click', () => { viewer.next(); update() })
        flipBtn.addEventListener('click', () => viewer.flip())

        update()
      }

      container.appendChild(section)
    }

    const gamesContainer = document.getElementById('games')
    for (const demo of DEMOS) {
      await buildDemo(demo, gamesContainer)
    }
  </script>
</body>
</html>
