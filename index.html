<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jChess Examples</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #2e2e2e;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f0d9b5;
    }

    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ── */

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      border-right: 1px solid #2e2e2e;
      overflow-y: auto;
      padding: 0.5rem 0;
    }

    .sidebar-item {
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-size: 0.875rem;
      color: #aaa;
      border-left: 3px solid transparent;
      transition: background 100ms, color 100ms;
      line-height: 1.3;
    }

    .sidebar-item:hover {
      background: #242424;
      color: #e0e0e0;
    }

    .sidebar-item.active {
      border-left-color: #b58863;
      background: #242424;
      color: #f0d9b5;
    }

    /* ── Main area ── */

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      min-width: 0;
      overflow-y: auto;
    }

    .board-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .board-wrap {
      --jchess-size: min(480px, 75dvh);
      flex-shrink: 0;
    }

    /* ── Controls ── */

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
    }

    button {
      padding: 0.4rem 0.9rem;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 100ms;
    }
    button:hover:not(:disabled) { background: #3a3a3a; }
    button:disabled { opacity: 0.35; cursor: default; }

    .move-display {
      font-family: monospace;
      font-size: 0.9rem;
      color: #f0d9b5;
      min-height: 1.2em;
    }

    .halfmove-display {
      font-size: 0.75rem;
      color: #555;
    }

    .annotation {
      font-size: 0.8rem;
      line-height: 1.5;
      color: #888;
      font-style: italic;
      white-space: pre-wrap;
      text-align: center;
      max-width: 400px;
    }

    .no-controls {
      font-size: 0.8rem;
      color: #555;
      font-style: italic;
    }

    .source-details {
      width: 100%;
      max-width: min(480px, 75dvh);
    }

    .source-details summary {
      font-size: 0.75rem;
      color: #555;
      cursor: pointer;
      user-select: none;
      padding: 0.25rem 0;
    }
    .source-details summary:hover { color: #888; }

    .source-details pre {
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 4px;
      font-size: 0.75rem;
      color: #aaa;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    .game-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f0d9b5;
      margin-bottom: 0.25rem;
    }
  </style>
  <script type="module" crossorigin src="/jchess/assets/index-0pnHi7im.js"></script>
</head>
<body>
  <header>
    <h1>jChess</h1>
  </header>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main" id="main"></div>
  </div>

</body>
</html>
